regression:
  - name: LinearRegression
    estimator: sklearn.linear_model.LinearRegression
    fixed_params: {}
    param_grid: {}

  - name: Ridge
    estimator: sklearn.linear_model.Ridge
    fixed_params: {}
    param_grid:
      alpha: [0.01, 0.1, 1.0, 10.0]

  - name: Lasso
    estimator: sklearn.linear_model.Lasso
    fixed_params:
      max_iter: 50000
    param_grid:
      alpha: [0.001, 0.01, 0.1]

  - name: ElasticNet
    estimator: sklearn.linear_model.ElasticNet
    fixed_params:
      max_iter: 50000
    param_grid:
      alpha: [0.01, 0.1, 1.0]
      l1_ratio: [0.2, 0.5, 0.8]

  - name: KNeighborsRegressor
    estimator: sklearn.neighbors.KNeighborsRegressor
    fixed_params: {}
    param_grid:
      n_neighbors: [1, 3, 5]
      weights: ["uniform", "distance"]

  - name: SVR
    estimator: sklearn.svm.SVR
    fixed_params: {}
    param_grid:
      C: [0.1, 1.0, 10.0]
      kernel: ["linear", "rbf"]
      gamma: ["scale", "auto"]

  - name: DecisionTreeRegressor
    estimator: sklearn.tree.DecisionTreeRegressor
    fixed_params: {}
    param_grid:
      max_depth: [3, 5, null]
      min_samples_split: [2, 4]
      min_samples_leaf: [1, 3, 5]

  - name: RandomForestRegressor
    estimator: sklearn.ensemble.RandomForestRegressor
    fixed_params: {}
    param_grid:
      n_estimators: [100, 200]
      max_depth: [3, 5, null]
      min_samples_leaf: [1, 3]

  - name: GradientBoostingRegressor
    estimator: sklearn.ensemble.GradientBoostingRegressor
    fixed_params: {}
    param_grid:
      n_estimators: [100, 200]
      learning_rate: [0.05, 0.1]
      max_depth: [2, 3]
      subsample: [0.8, 1.0]

  - name: XGBRegressor
    estimator: xgboost.XGBRegressor
    fixed_params:
      objective: reg:squarederror
      n_jobs: 1
      verbosity: 0
    param_grid:
      n_estimators: [100, 200]
      learning_rate: [0.05, 0.1]
      max_depth: [3, 5]
      subsample: [0.8, 1.0]
      colsample_bytree: [0.8, 1.0]

classification:
  - name: LinearDiscriminantAnalysis
    estimator: sklearn.discriminant_analysis.LinearDiscriminantAnalysis
    fixed_params: {}
    param_grid:
      solver: ["svd"]

  - name: RidgeLikeClassifier
    estimator: sklearn.linear_model.LogisticRegression
    fixed_params:
      max_iter: 20000
    param_grid:
      C: [0.1, 1.0, 10.0]
      penalty: ["l2"]
      solver: ["liblinear"]

  - name: LassoLikeClassifier
    estimator: sklearn.linear_model.LogisticRegression
    fixed_params:
      max_iter: 20000
    param_grid:
      C: [0.1, 1.0, 10.0]
      penalty: ["l1"]
      solver: ["liblinear"]

  - name: ElasticNetClassifier
    estimator: sklearn.linear_model.LogisticRegression
    fixed_params:
      max_iter: 20000
    param_grid:
      C: [0.1, 1.0, 10.0]
      penalty: ["elasticnet"]
      solver: ["saga"]
      l1_ratio: [0.2, 0.5, 0.8]

  - name: KNeighborsClassifier
    estimator: sklearn.neighbors.KNeighborsClassifier
    fixed_params: {}
    param_grid:
      n_neighbors: [1, 3, 5]
      weights: ["uniform", "distance"]

  - name: SVC
    estimator: sklearn.svm.SVC
    fixed_params:
      probability: true
    param_grid:
      C: [0.1, 1.0, 10.0]
      kernel: ["linear", "rbf"]
      gamma: ["scale", "auto"]

  - name: DecisionTreeClassifier
    estimator: sklearn.tree.DecisionTreeClassifier
    fixed_params: {}
    param_grid:
      max_depth: [3, 5, null]
      min_samples_split: [2, 4]
      min_samples_leaf: [1, 3, 5]

  - name: RandomForestClassifier
    estimator: sklearn.ensemble.RandomForestClassifier
    fixed_params: {}
    param_grid:
      n_estimators: [100, 200]
      max_depth: [3, 5, null]
      min_samples_leaf: [1, 3]

  - name: GradientBoostingClassifier
    estimator: sklearn.ensemble.GradientBoostingClassifier
    fixed_params: {}
    param_grid:
      n_estimators: [100, 200]
      learning_rate: [0.05, 0.1]
      max_depth: [2, 3]
      subsample: [0.8, 1.0]

  - name: XGBClassifier
    estimator: xgboost.XGBClassifier
    fixed_params:
      objective: binary:logistic
      n_jobs: 1
      verbosity: 0
    param_grid:
      n_estimators: [100, 200]
      learning_rate: [0.05, 0.1]
      max_depth: [3, 5]
      subsample: [0.8, 1.0]
      colsample_bytree: [0.8, 1.0]
